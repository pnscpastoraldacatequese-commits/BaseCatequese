<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Turma - Catequese</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; font-size: 24px}
        input, button { padding: 40px; margin: 5px; border-radius: 5px; border: 1px solid #0e0e0e;font-size: 24px; width: 80%}
        #resultado { margin-top: 20px; font-weight: bold; font-size: 30px}
        .btn-zap { background-color: #25d366; color: white; text-decoration: none; padding: 40px 20px; display: inline-block; border-radius: 5px; margin-top: 10px; font-size: 30px }
    </style>
</head>
<body>
    <!-- CABEÇALHO COM IMAGEM (Link direto para o GitHub) -->
    <img src="https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/BaseCatequese/main/CABE%C3%87ALHO.jpeg" 
         alt="Banner de Cabeçalho - Registro de Presença Catequese" 
         class="header-image"
         onerror="this.src='https://placehold.co/1200x150/4c7cbf/ffffff?text=FALHA+AO+CARREGAR+IMAGEM+DO+GITHUB';">
    <h2>DIGITE O NOME COMPLETO DO CATEQUIZANDO EM LETRAS MAIÚSCULAS</h2>
    <input type="text" id="nomeCatequizando" placeholder="LETRAS MAIÚSCULAS">
    <button onclick="buscar()">Consultar</button>

    <div id="resultado"></div>

    <script>
        function buscar() {
    const nome = document.getElementById('nomeCatequizando').value;
    const divRes = document.getElementById('resultado');
    divRes.innerHTML = "Buscando...";

    const urlScript = "https://script.google.com/macros/s/AKfycbyWEwMVRnVT32H5_Ghk77PJrrQW0Eg_9pfNCgcgwjwtyzG-HEa503mDOXgA_KHeHNMaJA/exec"; // Certifique-se que termina em /exec

    fetch(urlScript + "?nome=" + encodeURIComponent(nome))
        .then(res => res.json())
        .then(data => {
            if (data.erro) {
                divRes.innerHTML = "Nome não localizado. Verifique se escreveu corretamente.";
            } else {
                divRes.innerHTML = `Sua turma: ${data.turma}<br><br>` +
                                 `<a href="${data.link}" class="btn-zap" target="_blank">Entrar no Grupo do WhatsApp</a>`;
            }
        })
        .catch(err => {
            divRes.innerHTML = "Erro de conexão. Verifique se o link do script está correto.";
            console.error(err);
        });
}
    </script>
</body>
</html>
